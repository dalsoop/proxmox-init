# cargo-deny 설정 — https://embarkstudios.github.io/cargo-deny/
[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"

[licenses]
# 허용 라이선스 (prelik은 MIT)
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
