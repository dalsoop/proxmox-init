# cargo-deny 설정 — https://embarkstudios.github.io/cargo-deny/
# 스펙 버전 2 (cargo-deny >= 0.14). 옛 필드(vulnerability/unmaintained 문자열) 는
# enum 으로 바뀌어 "deny" 를 거부 → 제거하고 기본값(deny/warn) 에 맡김.

[advisories]
version = 2
yanked = "warn"
# ignore = [ ] # CVE ID 무시 필요 시

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# 워크스페이스 내부(first-party) crate 는 license 필드 명시 안 해도 무시.
# (workspace.package.license = "MIT" 은 있지만 각 crate 수동 설정 강제를 피함.)
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
