name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-linux, aarch64-linux]
        include:
          - target: x86_64-linux
            rust_target: x86_64-unknown-linux-gnu
          - target: aarch64-linux
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Install cross
        if: matrix.target == 'aarch64-linux'
        run: cargo install cross --locked
      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-linux" ]; then
            cross build --release --target ${{ matrix.rust_target }}
          else
            cargo build --release --target ${{ matrix.rust_target }}
          fi
      - name: Package
        run: |
          mkdir -p dist
          cd target/${{ matrix.rust_target }}/release
          for bin in prelik prelik-bootstrap prelik-connect prelik-manager; do
            [ -f "$bin" ] && cp "$bin" ../../../dist/
          done
          cd ../../../dist
          tar czf "../prelik-${{ matrix.target }}.tar.gz" *
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: prelik-${{ matrix.target }}.tar.gz
