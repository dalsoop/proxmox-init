name: Release

on:
  push:
    tags:
      - "v*"

# workflow 최상단은 최소권한. release job 만 contents: write 로 override (codex #45 P2).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ncl-gate:
    # Nickel contract 통과 안 한 태그는 릴리스로 못 나감.
    # ncl-validate.yml 과 동일한 검증 로직을 재사용 workflow 로 공유 — 드리프트 방지 (codex #45 P2).
    uses: ./.github/workflows/reusable-ncl-eval.yml

  locale-export:
    # ncl/domains.ncl 을 JSON 으로 렌더해 locale.json artifact 로 업로드.
    # 릴리스 tarball 에 포함되어 런타임 consumer (PR 5) 가 읽는 SSOT 가 됨.
    # mac-app-init install-local.sh:15-23 의 nickel export 패턴을 CI 에 반영.
    needs: ncl-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NICKEL_VERSION: "1.16.0"
    steps:
      - uses: actions/checkout@v4
      - name: Install Nickel ${{ env.NICKEL_VERSION }}
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          curl -fsSL \
            "https://github.com/tweag/nickel/releases/download/${NICKEL_VERSION}/nickel-x86_64-linux" \
            -o "$HOME/.local/bin/nickel"
          chmod +x "$HOME/.local/bin/nickel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Render locale.json
        run: nickel export --format json ncl/domains.ncl > locale.json
      - name: Upload locale.json
        uses: actions/upload-artifact@v4
        with:
          name: locale-json
          path: locale.json

  build:
    needs: ncl-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NICKEL_VERSION: "1.16.0"
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
        binary:
          - pxi-code-server
          - pxi-wordpress
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # build.rs 가 nickel 로 ncl/domains.ncl 을 export 해 binary 에 embed —
      # nickel 미설치면 empty `{}` 가 구워져 runtime tier-2 가 무용지물이 됨 (codex #53 P1).
      - name: Install Nickel ${{ env.NICKEL_VERSION }}
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          curl -fsSL \
            "https://github.com/tweag/nickel/releases/download/${NICKEL_VERSION}/nickel-x86_64-linux" \
            -o "$HOME/.local/bin/nickel"
          chmod +x "$HOME/.local/bin/nickel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/nickel" --version

      - name: Build ${{ matrix.binary }}
        run: cargo build --release -p ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Smoke test
        run: bash tests/smoke.sh target/${{ matrix.target }}/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: [build, locale-export]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*"
          generate_release_notes: true
