name: Release

on:
  push:
    tags:
      - "v*"

# workflow 최상단은 최소권한. release job 만 contents: write 로 override (codex #45 P2).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ncl-gate:
    # Nickel contract 통과 안 한 태그는 릴리스로 못 나감.
    # ncl-validate.yml 과 동일한 검증 로직을 재사용 workflow 로 공유 — 드리프트 방지 (codex #45 P2).
    uses: ./.github/workflows/reusable-ncl-eval.yml

  build:
    needs: ncl-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
        binary:
          - pxi-code-server
          - pxi-wordpress
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.binary }}
        run: cargo build --release -p ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Smoke test
        run: bash tests/smoke.sh target/${{ matrix.target }}/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*"
          generate_release_notes: true
