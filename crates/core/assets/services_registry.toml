# pxi 서비스 레지스트리 — 정본 VMID/alias 매핑
# 정본: /root/control-plane/config/services_registry.toml
# 검증: /root/control-plane/nickel/services_registry_contract.ncl
# 로더:  pxi_core::registry::services
#
# 새 LXC 추가 시 여기 등록. VMID↔IP 는 convention 으로 자동 유도되므로 기록 불필요.

[services.traefik]
vmid = "50100"
description = "Traefik v3 리버스 프록시 + ACME"

