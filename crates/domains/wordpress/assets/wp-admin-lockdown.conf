# WordPress admin lockdown — *.internal.kr 도메인에서만 관리자 경로 허용
# 중앙 관리 파일. 이 한 파일만 바꾸면 모든 vhost 에 자동 반영.
#
# 대상 경로 : /wp-admin/*, /wp-login.php, /xmlrpc.php → 403 if Host !~ internal.kr
# 예외 : /wp-admin/admin-ajax.php (공개 폼 submit 용)
#
# 관리 : pxi run wordpress lockdown-apply / lockdown-status / lockdown-test

<LocationMatch "^/(wp-admin(/.*)?|wp-login\.php|xmlrpc\.php)$">
    Require expr "%{HTTP_HOST} =~ /\.internal\.kr(:\d+)?$/i"
    ErrorDocument 403 "Admin access restricted to internal.kr domains."
</LocationMatch>

# admin-ajax.php 는 공개 엔드포인트이므로 예외 허용
<Location "/wp-admin/admin-ajax.php">
    Require all granted
</Location>
