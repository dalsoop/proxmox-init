[service]
name = "ministack"
description = "MiniStack — LocalStack 오픈 포크 (로컬 AWS 에뮬레이터)"

[lxc]
cores = "2"
memory = "2048"
disk = "12"

[install]
packages = ["docker.io", "docker-compose-v2", "curl"]

[[install.steps]]
name = "Docker daemon enable"
run = "systemctl enable --now docker"

[[install.steps]]
name = "upstream compose 다운로드 (핀: v1.2.15) + 로컬 안전 패치"
run = """
mkdir -p /opt/ministack
cd /opt/ministack

# 태그 핀 — main 추적 금지. 재현성 + 공급망 드리프트 차단.
# 업그레이드는 레시피 버전 bump로 명시적으로.
PIN="${MINISTACK_PIN:-v1.2.15}"
[ -f docker-compose.yml ] || curl -fsSL \
  "https://raw.githubusercontent.com/ministackorg/ministack/${PIN}/docker-compose.yml" \
  -o docker-compose.yml

# 1) build: . 제거 — pre-built image만 사용
sed -i '/^\\s*build:\\s*\\.\\s*$/d' docker-compose.yml

# 2) docker.sock 마운트 제거 — 컨테이너 침해 시 Docker 호스트 root-equivalent 권한 회피.
#    MINISTACK_DOCKER=1 환경변수로 opt-in 가능 (ECS/Fargate 에뮬 필요 시).
if [ "${MINISTACK_DOCKER:-0}" != "1" ]; then
  sed -i '/\\/var\\/run\\/docker\\.sock:\\/var\\/run\\/docker\\.sock/d' docker-compose.yml
fi
"""

[[install.steps]]
name = "compose up -d"
run = "cd /opt/ministack && docker compose up -d"

[[install.steps]]
name = "AWS CLI 환경변수 주입 (/etc/profile.d/ministack.sh)"
run = """
cat > /etc/profile.d/ministack.sh << 'SH'
export AWS_ACCESS_KEY_ID=test
export AWS_SECRET_ACCESS_KEY=test
export AWS_DEFAULT_REGION=us-east-1
export AWS_ENDPOINT_URL=http://localhost:4566
SH
chmod 644 /etc/profile.d/ministack.sh
"""

[[install.steps]]
name = "검증 (/_ministack/health)"
run = """
for i in $(seq 1 90); do
  curl -fsS http://localhost:4566/_ministack/health -o /dev/null && echo "✓ ministack 동작 (:4566)" && exit 0
  sleep 1
done
echo "✗ ministack 시작 실패 (90초 타임아웃) — docker compose logs로 확인" >&2
exit 1
"""
