[service]
name = "postgres"
description = "PostgreSQL 16 + 외부 접속 허용 + 기본 DB/유저"

[lxc]
cores = "2"
memory = "2048"
disk = "16"

[install]
packages = ["postgresql", "postgresql-contrib"]

# 환경변수로 오버라이드 가능: pxi run deploy service ... --env DB_NAME=... --env DB_USER=...
# 미설정 시 아래 기본값.

[[install.steps]]
name = "PostgreSQL 외부 접속 허용 (listen_addresses)"
run = """
PGCONF=$(ls /etc/postgresql/*/main/postgresql.conf | head -1)
sed -i "s/^#*listen_addresses.*/listen_addresses = '*'/" "$PGCONF"
"""

[[install.steps]]
name = "pg_hba.conf — host all all 0.0.0.0/0 scram-sha-256"
run = """
PGHBA=$(ls /etc/postgresql/*/main/pg_hba.conf | head -1)
grep -q "0.0.0.0/0" "$PGHBA" || \
  echo "host all all 0.0.0.0/0 scram-sha-256" >> "$PGHBA"
"""

[[install.steps]]
name = "systemd 재시작 + enable"
run = "systemctl restart postgresql && systemctl enable postgresql"

[[install.steps]]
name = "기본 DB/유저 생성 (idempotent)"
run = """
DB_NAME="${DB_NAME:-app}"
DB_USER="${DB_USER:-app}"
DB_PASSWORD="${DB_PASSWORD:-changeme}"
sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 || \
  sudo -u postgres psql -c "CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASSWORD';"
sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
  sudo -u postgres createdb -O "$DB_USER" "$DB_NAME"
"""

[[install.steps]]
name = "검증"
run = "systemctl is-active postgresql && sudo -u postgres psql -c '\\l' | grep -q app && echo '✓ postgres 동작'"
