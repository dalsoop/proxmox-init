[service]
name = "infisical"
description = "Infisical — 오픈소스 시크릿 관리 (Docker Compose)"
# 주의: 이 레시피는 upstream 'infisical/infisical:latest' 이미지를 추적합니다.
# Production 배포는 이 레시피를 복사해 image 라인을 명시 digest로 pin하고
# pull_policy: always를 제거하세요.

[lxc]
cores = "2"
memory = "2048"
disk = "10"

[install]
packages = ["docker.io", "docker-compose-v2", "curl", "openssl"]

[[install.steps]]
name = "Docker daemon enable"
run = "systemctl enable --now docker"

[[install.steps]]
name = "compose + .env 자동 생성 (POSTGRES/REDIS 포함)"
run = """
mkdir -p /opt/infisical
cd /opt/infisical

# 공식 self-host compose — commit SHA 핀 (main 추적 금지, compose 구조 안정화).
# 매 실행마다 재다운로드 — INFISICAL_PIN 변경이 즉시 반영되도록.
PIN="${INFISICAL_PIN:-73b274e3dcbaa89afa9f3caed2db2ff101f39c7d}"
curl -fsSL \
  "https://raw.githubusercontent.com/Infisical/infisical/${PIN}/docker-compose.prod.yml" \
  -o docker-compose.yml

if [ ! -f .env ]; then
  ENCRYPTION_KEY=$(openssl rand -hex 16)
  AUTH_SECRET=$(openssl rand -base64 32)
  JWT_SIGNUP_SECRET=$(openssl rand -hex 32)
  JWT_REFRESH_SECRET=$(openssl rand -hex 32)
  JWT_AUTH_SECRET=$(openssl rand -hex 32)
  JWT_MFA_SECRET=$(openssl rand -hex 32)
  JWT_SERVICE_SECRET=$(openssl rand -hex 32)
  JWT_PROVIDER_AUTH_SECRET=$(openssl rand -hex 32)
  PG_PASSWORD=$(openssl rand -hex 16)

  # upstream compose가 backend:80 → host:80으로 publish함. SITE_URL/검증 모두 :80.
  cat > .env << ENV
ENCRYPTION_KEY=${ENCRYPTION_KEY}
AUTH_SECRET=${AUTH_SECRET}
JWT_SIGNUP_SECRET=${JWT_SIGNUP_SECRET}
JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
JWT_AUTH_SECRET=${JWT_AUTH_SECRET}
JWT_MFA_SECRET=${JWT_MFA_SECRET}
JWT_SERVICE_SECRET=${JWT_SERVICE_SECRET}
JWT_PROVIDER_AUTH_SECRET=${JWT_PROVIDER_AUTH_SECRET}
POSTGRES_USER=infisical
POSTGRES_PASSWORD=${PG_PASSWORD}
POSTGRES_DB=infisical
DB_CONNECTION_URI=postgres://infisical:${PG_PASSWORD}@db:5432/infisical
REDIS_URL=redis://redis:6379
SITE_URL=${INFISICAL_SITE_URL:-http://localhost:80}
ENV
  chmod 600 .env
fi
"""

[[install.steps]]
name = "compose up -d"
run = "cd /opt/infisical && docker compose up -d"

[[install.steps]]
name = "검증 (:80 응답까지 120초 — db migration 포함)"
run = """
for i in $(seq 1 120); do
  curl -fsS http://localhost:80/ -o /dev/null && echo "✓ infisical 동작 (:80)" && exit 0
  sleep 1
done
echo "✗ infisical 시작 실패 (120초 타임아웃) — docker compose logs로 확인" >&2
exit 1
"""
